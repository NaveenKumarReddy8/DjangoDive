{% load static %}
{% load tags %}
<!DOCTYPE html>
<html>
    <head>
        <title>
            {% block title %}{% endblock %}
        </title>
        <link href="{% static "css/blogs.css" %}" rel="stylesheet" />
    </head>
    <body>
        <div id="content">
            {% block content %}
            {% endblock %}
        </div>
        <div id="sidebar">
            <h2>My Blog</h2>
            <p>This is my blog.</p>
            <p>Total number of posts are: {% total_posts %}</p>
            <p>Latest Posts</p>
            {% latest_posts 3 %}
        </div>
    </body>
</html>
